function drawPupPreview(id,t){
  const cv=document.getElementById(`demo-${id}`);if(!cv)return;
  const cx2=cv.getContext('2d');if(!cx2)return;
  const W=40,H=40;
  cx2.clearRect(0,0,W,H);
  cx2.fillStyle='#0a1828';cx2.fillRect(0,0,W,H);
  const def=PU_DEFS.find(d=>d.id===id);if(!def)return;
  // Small snake shape (5 segments, horizontal)
  const snkX=22,snkY=20,snkW=5;
  function drawSnake(alpha,col,headX,headY){
    cx2.save();cx2.globalAlpha=alpha;
    for(let i=0;i<snkW;i++){
      cx2.fillStyle=i===0?col:'#2a7068';
      cx2.fillRect(headX-i*6,headY-3,5,5);
    }
    cx2.restore();
  }
  // Animated walls (for WBUST/GHOST)
  function drawWall(x,y,crk){
    cx2.fillStyle='#122e48';cx2.fillRect(x,y,8,8);
    if(crk){cx2.strokeStyle='#ff4444';cx2.lineWidth=1;cx2.beginPath();cx2.moveTo(x+2,y);cx2.lineTo(x+5,y+8);cx2.stroke();}
  }
  switch(id){
    case'SPEED':{
      const off=(t%1)*8;
      for(let i=0;i<3;i++){cx2.strokeStyle=`rgba(255,255,0,${0.15-i*.05})`;cx2.lineWidth=2;cx2.beginPath();cx2.moveTo(snkX-i*4-off,snkY);cx2.lineTo(snkX-i*4-off-8,snkY);cx2.stroke();}
      drawSnake(1,'#6dc8bf',snkX,snkY);
      cx2.fillStyle='#ffff00';cx2.font='12px serif';cx2.textAlign='center';cx2.fillText('⚡',20,36);
      break;}
    case'SLOW':{
      drawSnake(1,'#6dc8bf',snkX-(Math.sin(t*.5)*2|0),snkY);
      cx2.fillStyle='#00ff88';cx2.font='12px serif';cx2.textAlign='center';cx2.fillText('🐢',20,36);
      break;}
    case'GHOST':{
      drawWall(28,14,false);drawWall(28,22,false);
      drawSnake(0.4,'#88ffff',30,18);
      cx2.fillStyle='#88ffff';cx2.font='12px serif';cx2.textAlign='center';cx2.fillText('👻',20,36);
      break;}
    case'SMULT':{
      const glow=0.5+0.5*Math.sin(t*3);
      cx2.beginPath();cx2.arc(20,18,8+glow*3,0,Math.PI*2);cx2.fillStyle=`rgba(255,221,0,${0.15+glow*.1})`;cx2.fill();
      cx2.fillStyle='#ffdd00';cx2.font='10px serif';cx2.textAlign='center';cx2.fillText('⭐',20,22);
      cx2.fillStyle='#ffdd00';cx2.font='7px sans-serif';cx2.fillText('×2',20,34);
      break;}
    case'SHIELD':{
      const ang=t*2;
      cx2.strokeStyle='#4488ff';cx2.lineWidth=2;cx2.beginPath();cx2.arc(20,18,12,0,Math.PI*2);cx2.stroke();
      cx2.fillStyle='#4488ff';cx2.beginPath();cx2.arc(20+Math.cos(ang)*12,18+Math.sin(ang)*12,3,0,Math.PI*2);cx2.fill();
      cx2.fillStyle='#6dc8bf';cx2.beginPath();cx2.arc(20,18,4,0,Math.PI*2);cx2.fill();
      break;}
    case'MAGNET':{
      for(let i=0;i<3;i++){
        const a=i*Math.PI*2/3+t;
        const fx=20+Math.cos(a)*(10-t%3*2),fy=18+Math.sin(a)*(10-t%3*2);
        cx2.fillStyle='#ffb3cc';cx2.beginPath();cx2.arc(fx,fy,2.5,0,Math.PI*2);cx2.fill();
      }
      cx2.fillStyle='#ff4488';cx2.font='12px serif';cx2.textAlign='center';cx2.fillText('🧲',20,22);
      break;}
    case'AMMO':{
      cx2.fillStyle='#ff8800';cx2.font=`bold ${8+Math.floor(t%1*2)}px 'Press Start 2P',monospace`;
      cx2.textAlign='center';cx2.textBaseline='middle';cx2.fillText('+5',20,14);
      cx2.fillStyle='#fff';cx2.font='10px serif';cx2.fillText('🎯',20,28);cx2.textBaseline='alphabetic';
      break;}
    case'TCUT':{
      const cut=t>1.5;
      for(let i=0;i<snkW;i++){
        cx2.globalAlpha=(cut&&i>=2)?Math.max(0,1-(t-1.5)*.8):1;
        cx2.fillStyle=i===0?'#6dc8bf':'#2a7068';cx2.fillRect(snkX-i*6,snkY-3,5,5);
      }
      cx2.globalAlpha=1;
      cx2.fillStyle='#ff44ff';cx2.font='10px serif';cx2.textAlign='center';cx2.fillText('✂',20,36);
      break;}
    case'LIFE':{
      const bounce=Math.abs(Math.sin(t*3))*5;
      cx2.fillStyle='#ff0044';cx2.shadowColor='#ff0044';cx2.shadowBlur=10;
      cx2.font='18px serif';cx2.textAlign='center';cx2.fillText('❤',20,22-bounce);
      cx2.shadowBlur=0;
      break;}
    case'REV':{
      const arcAng=t*Math.PI;
      cx2.strokeStyle='#ff8844';cx2.lineWidth=2;cx2.beginPath();
      cx2.arc(20,18,10,-Math.PI/2,arcAng-Math.PI/2);cx2.stroke();
      drawSnake(1,'#6dc8bf',snkX-Math.floor(t%2)*3,snkY);
      cx2.fillStyle='#ff8844';cx2.font='10px serif';cx2.textAlign='center';cx2.fillText('↩',20,36);
      break;}
    case'SHRINK':{
      const rm=Math.min(4,Math.floor(t*2));
      for(let i=0;i<snkW;i++){
        cx2.globalAlpha=i>=snkW-rm?Math.max(0,1-(t*2-i+1)):1;
        cx2.fillStyle=i===0?'#6dc8bf':'#2a7068';cx2.fillRect(snkX-i*6,snkY-3,5,5);
      }
      cx2.globalAlpha=1;
      cx2.fillStyle='#88ff44';cx2.font='10px serif';cx2.textAlign='center';cx2.fillText('💊',20,36);
      break;}
    case'WBUST':{
      const explode=t>2.5;
      if(!explode){drawWall(28,14,t>1.2);drawWall(28,22,t>1.5);}
      else{
        const sp=t-2.5;
        for(let i=0;i<5;i++){const a=i*Math.PI*.4;cx2.fillStyle='#ff4444';cx2.globalAlpha=Math.max(0,1-sp);cx2.fillRect(28+Math.cos(a)*sp*8,14+Math.sin(a)*sp*6,3,3);}
        cx2.globalAlpha=1;
      }
      cx2.fillStyle='#ff4444';cx2.font='10px serif';cx2.textAlign='center';cx2.fillText('💣',20,36);
      break;}
    default:{
      cx2.fillStyle=def.col;cx2.font='18px serif';cx2.textAlign='center';cx2.textBaseline='middle';
      cx2.fillText(def.icon,20,20);cx2.textBaseline='alphabetic';
    }
  }
  // Click hint
  cx2.fillStyle='#333';cx2.font='5px sans-serif';cx2.textAlign='center';cx2.textBaseline='alphabetic';
  if(t===0)cx2.fillText('▶ CLICK',20,38);
}

function showTutorial(){tutPage=0;renderTutPage();showS('tutorial');}
function tutNav(d){tutPage=Math.max(0,Math.min(TUT_PAGES.length-1,tutPage+d));renderTutPage();}
function renderTutPage(){
  const pg=TUT_PAGES[tutPage];
  document.getElementById('tut-title').textContent=pg.title;
  document.getElementById('tut-body').innerHTML=pg.content;
  document.getElementById('tut-pg').textContent=(tutPage+1)+' / '+TUT_PAGES.length;
  const prev=document.getElementById('tut-prev');
  const next=document.getElementById('tut-next');
  prev.style.opacity=tutPage===0?'0.3':'1';
  prev.style.pointerEvents=tutPage===0?'none':'auto';
  next.style.opacity=tutPage===TUT_PAGES.length-1?'0.3':'1';
  next.style.pointerEvents=tutPage===TUT_PAGES.length-1?'none':'auto';
  if(pg.content.includes('tut-pups')){
    const el=document.getElementById('tut-pups');
    if(el)el.innerHTML=PU_DEFS.map(d=>`
      <div style="display:flex;align-items:center;gap:7px;padding:5px 8px;border:1px solid #222;background:#061522;border-radius:3px">
        <span style="font-size:15px;line-height:1;flex-shrink:0">${d.icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:7px;color:${d.col};margin-bottom:2px">${d.lbl}</div>
          <div style="font-size:6px;color:#555;line-height:1.5">${d.desc||''}</div>
        </div>
        <button onclick="playPupSound('${d.id}')" style="font-family:'Press Start 2P',monospace;font-size:6px;padding:2px 5px;background:transparent;border:1px solid ${d.col};color:${d.col};cursor:pointer;border-radius:2px;flex-shrink:0">▶</button>
      </div>`).join('');
  }
}

function init(){
  initCanvas();initInput();
  initGuide();
  initTouch();
  loadCfg();
  // Wire initials input submit
  const goInp=document.getElementById('go-initials');
  if(goInp){
    goInp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();submitInitials();}
    });
  }
  showS('title');
  requestAnimationFrame(runTitleAnim);
}
init();
